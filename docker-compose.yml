services:
  compensation:
    image: ${COMPENSATION_IMAGE:-kimsehee98/trypto-compensation:v1}
    pull_policy: always
    networks:
      - trypto-net
    ports:
      - "8083:8083"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: trypto
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: 1234
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: trypto-collector-token
      INFLUXDB_ORG: trypto
      INFLUXDB_BUCKET: ticker
      MANAGEMENT_PORT: "8083"
      COMPENSATION_BOUNDARY_SECONDS: "30"
      COMPENSATION_INTERVAL_MS: "30000"
    depends_on:
      mysql:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8083/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
